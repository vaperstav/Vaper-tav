<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <title>Vapers_tav - Tropical Premium</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh; overflow: hidden; color: white;
            display: flex; align-items: center; justify-content: center;
        }

        /* Fondo con filtro de oscuridad para que el texto resalte */
        .bg-image { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            z-index: 0; object-fit: cover; filter: blur(3px) brightness(0.6); 
        }

        .page { 
            position: absolute; width: 100%; height: 100%;
            display: none; flex-direction: column; align-items: center; justify-content: flex-start;
            z-index: 10; padding: 80px 20px; overflow-y: auto;
            opacity: 0; transition: opacity 0.4s ease;
        }
        .active { display: flex; opacity: 1; }

        /* Estilo Glass sólido: Oscuro para que se lea perfecto */
        .glass-panel {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 25px;
            padding: 20px;
            text-align: center;
        }

        .title { font-size: 2.5rem; font-weight: 800; margin-bottom: 20px; text-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        .btn-rosa { 
            background: #ff00de; border: 3px solid #fff; 
            color: white; padding: 18px 45px; border-radius: 50px; 
            font-weight: 700; font-size: 1.1rem; cursor: pointer;
        }
        .btn-verde { 
            background: #39ff14; border: 3px solid #fff; 
            color: black; padding: 18px 45px; border-radius: 50px; 
            font-weight: 700; font-size: 1.1rem; cursor: pointer;
        }

        .aviso { 
            background: rgba(0,0,0,0.6); padding: 15px; border-radius: 20px; 
            border: 2px solid #ff00de; margin: 20px 0; font-weight: 600; text-align: center;
        }

        .card { 
            background: rgba(0,0,0,0.6);
            padding: 15px; border-radius: 20px; display: flex; align-items: center; gap: 15px;
            margin-bottom: 15px; border: 2px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

    <img src="https://i.postimg.cc/y89bVm9Y/images.jpg" class="bg-image" alt="Fondo">

    <div id="screen-home" class="page active">
        <h1 class="title">BIENVENIDO</h1>
        <div class="glass-panel" style="margin-bottom:20px;">@Vapers_tav</div>
        <button class="btn-rosa" onclick="goToStore()">ENTRAR</button>
    </div>

    <div id="screen-store" class="page">
        <h1 class="title">VAPERS</h1>
        <button class="btn-verde" onclick="showCatalog()">VER CATÁLOGO</button>
    </div>

    <div id="screen-catalog" class="page">
        <h1 class="title" style="font-size: 1.8rem;">SABORES</h1>
        <div class="aviso">⚠️ ¡Háblame por INSTAGRAM a @Vapers_tav y quedamos!</div>
        <div id="product-list" style="width: 100%; max-width: 400px;"></div>
        <button onclick="location.reload()" style="background:rgba(255,255,255,0.2); border:2px solid white; color:white; padding: 10px 20px; border-radius: 15px; margin-top:20px; cursor:pointer;">Volver</button>
    </div>

    <script>
        const productos = [
            { nombre: "Granada Fresa", desc: "40k caladas | 15€", img: "https://i.postimg.cc/1tGZdxRN/bud-vape-ole-plus-5000-granada-fresa-pod-desechable.webp" },
            { nombre: "Triple Mango", desc: "40k caladas | 15€", img: "https://i.postimg.cc/X7vTfB5p/vaper-lost-mary-triple-mango.jpg" },
            { nombre: "Lemon Lime", desc: "40k caladas | 15€", img: "https://i.postimg.cc/QM5LBLTJ/images-1.jpg" }
        ];

        function goToStore() { document.getElementById('screen-home').classList.remove('active'); setTimeout(()=>document.getElementById('screen-store').classList.add('active'), 100); }
        function showCatalog() { 
            document.getElementById('screen-store').classList.remove('active'); 
            setTimeout(()=>document.getElementById('screen-catalog').classList.add('active'), 100);
            const list = document.getElementById('product-list');
            list.innerHTML = "";
            productos.forEach(p => {
                list.innerHTML += `<div class="card"><img src="${p.img}" style="width:60px; height:60px; border-radius:15px; border: 1px solid white;"><div><h3>${p.nombre}</h3><p style="font-size:0.8rem;">${p.desc}</p></div></div>`;
            });
        }
    </script>
</body>
</html>
